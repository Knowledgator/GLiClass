# Model configuration
model: knowledgator/gliclass-edge-v3.0
device: cuda
dtype: float16

# Limits
max_model_len: 2048
max_labels: -1  # -1 for unlimited
max_labels_alloc: dynamic  # Memory allocation strategy: "dynamic", "fixed", or integer (e.g., 50)

# Thresholds
default_threshold: 0.5

# Ray Serve deployment
num_replicas: 1
num_gpus_per_replica: 1.0
num_cpus_per_replica: 1.0

# Batching configuration
max_batch_size: 128
batch_wait_timeout_ms: 50.0
request_timeout_s: 30.0
max_ongoing_requests: 512
queue_capacity: 8192

# HTTP configuration
route_prefix: /gliclass
http_port: 8000

# Threading
tokenizer_threads: 4

# Optimization features
enable_compilation: true
calibrate_on_startup: false
precompile_on_startup: false
use_memory_aware_batching: false

# Precompiled batch sizes (for compilation warmup)
precompiled_batch_sizes:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128

# Memory management
target_memory_fraction: 0.8
memory_overhead_factor: 1.3

# Calibration settings
calibration_min_seq_len: 64
calibration_min_batch_size: 1
calibration_max_batch_size: 64
calibration_probe_batch_size: 2

# Warmup
warmup_iterations: 3

# Ray cluster (optional)
ray_address: null  # null for local, or ray://<head_node>:10001 for cluster
